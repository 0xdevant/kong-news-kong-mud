# Deploy Worker + Pages on every push to main (needs CLOUDFLARE_API_TOKEN in repo secrets)
name: Deploy to Cloudflare

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply D1 migrations (remote)
        run: cd worker && npx wrangler d1 migrations apply hk-news-rss-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: "21c1a304a3cc9e14c82bc784f6abbfa9"

      - name: Deploy Worker and Pages
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Required for `wrangler pages deploy` (web/ has no wrangler.toml); same as worker account_id.
          CLOUDFLARE_ACCOUNT_ID: "21c1a304a3cc9e14c82bc784f6abbfa9"
