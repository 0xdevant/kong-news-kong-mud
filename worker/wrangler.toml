name = "kong-news-kong-mud-worker"
main = "src/index.ts"
# Avoids /memberships on deploy when using CLOUDFLARE_API_TOKEN (CI tokens often lack User scope).
account_id = "21c1a304a3cc9e14c82bc784f6abbfa9"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[triggers]
# Single cron (account limit: 5 triggers total across Workers). Hourly RSS; daily cleanup runs at 00:00 UTC inside the handler.
crons = ["0 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "hk-news-rss-db"
# Legacy D1 display name (binding uses database_id below)
database_id = "5308a69e-a5b0-4253-8d57-136af27cedf3"
migrations_dir = "migrations"

[vars]
WORKER_ENV = "production"
PAGES_ORIGIN = "https://news.clawify.dev"
# 排除關鍵字只對標題生效，避免正文摘要誤殺港聞；與 purge 一致
FILTER_APPLY_TO_TITLE_ONLY = "true"
