name = "kong-news-kong-mud-worker"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[triggers]
# Single cron (account limit: 5 triggers total across Workers). Hourly RSS; daily cleanup runs at 00:00 UTC inside the handler.
crons = ["0 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "hk-news-rss-db"
# Legacy D1 display name (binding uses database_id below)
database_id = "5308a69e-a5b0-4253-8d57-136af27cedf3"

[vars]
WORKER_ENV = "production"
PAGES_ORIGIN = "https://kong-news-kong-mud-web.pages.dev"
