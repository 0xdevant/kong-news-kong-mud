<!DOCTYPE html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>港聞講乜</title>
    <meta name="description" content="香港本地媒體新聞一覽。聚合標題與摘要，點擊前往原文支持出版方。" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#f8f6fc" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0e0b14" media="(prefers-color-scheme: dark)" />
    <script>
      (function () {
        var t = localStorage.getItem("gangwen_theme");
        if (
          t === "dark" ||
          (!t && window.matchMedia("(prefers-color-scheme: dark)").matches)
        )
          document.documentElement.classList.add("dark");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
